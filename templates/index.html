<!DOCTYPE html>
<html>
<head>
    <title>Daylight Comparison</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .box { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .row { display: flex; gap: 5px; margin-bottom: 10px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        #addBtn { background: #6c757d; color: white; margin-bottom: 10px; }
        #submitBtn { background: #007bff; color: white; width: 100%; }
        #status { display: none; text-align: center; margin: 15px; color: #007bff; }
        img { display: none; width: 100%; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="box">
    <h2>☀️ Daylight Plotter</h2>
    <p>Compare daytime in different cities.</p>
    <form id="plotForm">
        <div id="inputs">
            <div class="row">
                <input type="text" name="country" placeholder="Country (e.g. finland)" required>
                <input type="text" name="city" placeholder="City (e.g. tampere)" required>
            </div>
        </div>
        <button type="button" id="addBtn">+ Add City</button>
        <button type="submit" id="submitBtn">Generate Plot</button>
    </form>
    <div id="status">⌛ Loading  data...</div>
    <img id="plotImage">
</div>

<script>
    $(document).ready(function() {
        $('#addBtn').click(() => {
            $('#inputs').append('<div class="row"><input type="text" name="country" placeholder="Country" required><input type="text" name="city" placeholder="City" required></div>');
        });

        $('#plotForm').submit(async function(e) {
            e.preventDefault();
            $('#status').show();
            $('#plotImage').hide();

            const locations = [];
            $('.row').each(function() {
                locations.push({
                    country: $(this).find('input[name="country"]').val(),
                    city: $(this).find('input[name="city"]').val()
                });
            });

            try {
                const response = await fetch('/plot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ locations })
                });

                if (!response.ok) throw new Error("Check spelling or logs.");

                const blob = await response.blob();
                $('#plotImage').attr('src', URL.createObjectURL(blob)).show();
            } catch (err) {
                alert(err.message);
            } finally {
                $('#status').hide();
            }
        });
    });
</script>
</body>
</html>
