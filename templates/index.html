<!DOCTYPE html>
<html>
<head>
    <title>Day Length Comparison</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Day Length Comparison</h1>
    <form id="dayLengthForm">
        <label for="year">Year:</label>
        <input type="number" id="year" name="year" value="2024" required><br>
        
        <h3>Locations:</h3>
        <div id="locations">
            <div class="location">
                <label>Country:</label>
                <input type="text" name="country" placeholder="e.g. usa" required>
                <label>City:</label>
                <input type="text" name="city" placeholder="e.g. new-york" required>
            </div>
        </div>
        <br>
        <button type="button" id="addLocation">+ Add Location</button>
        <button type="submit">Generate Plot</button>
    </form>

    <div id="status" style="margin-top: 20px; color: blue; display: none;">Generating plot... This may take 30 seconds.</div>
    
    <div style="margin-top: 30px;">
        <img id="plotImage" style="display: none; max-width: 100%; border: 1px solid #ccc;">
    </div>

    <script>
        $(document).ready(function() {
            $('#addLocation').click(function() {
                $('#locations').append('<div class="location" style="margin-top:10px;"><label>Country:</label><input type="text" name="country" required><label>City:</label><input type="text" name="city" required></div>');
            });

            $('#dayLengthForm').submit(async function(event) {
                event.preventDefault();
                $('#status').show();
                $('#plotImage').hide();

                const locations = [];
                $('.location').each(function() {
                    locations.push({
                        country: $(this).find('input[name="country"]').val(),
                        city: $(this).find('input[name="city"]').val()
                    });
                });

                const year = $('#year').val();

                try {
                    const response = await fetch('/plot', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ locations, year })
                    });

                    if (!response.ok) throw new Error('Server error');

                    const blob = await response.blob();
                    const imgUrl = URL.createObjectURL(blob);
                    $('#plotImage').attr('src', imgUrl).show();
                } catch (error) {
                    alert("Error generating plot. Check city names or server logs.");
                    console.error(error);
                } finally {
                    $('#status').hide();
                }
            });
        });
    </script>
</body>
</html>
