<!DOCTYPE html>
<html>
<head>
    <title>Day Length Comparison</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .location { margin-bottom: 10px; border: 1px solid #ccc; padding: 10px; }
        #status { color: blue; font-weight: bold; display: none; }
        #plotImage { display: none; margin-top: 20px; max-width: 100%; }
    </style>
</head>
<body>
    <h1>Day Length Comparison</h1>
    <form id="dayLengthForm">
        <label>Year: <input type="number" id="year" value="2024" required></label>
        <h3>Locations:</h3>
        <div id="locations">
            <div class="location">
                <input type="text" name="country" placeholder="Country (e.g. finland)" required>
                <input type="text" name="city" placeholder="City (e.g. tampere)" required>
            </div>
        </div>
        <button type="button" id="addLocation">+ Add Location</button>
        <button type="submit">Generate Plot</button>
    </form>

    <div id="status">⏳ Scraping 12 months of data... Please wait about 20 seconds.</div>
    <img id="plotImage">

    <script>
        $(document).ready(function() {
            $('#addLocation').click(() => {
                $('#locations').append('<div class="location"><input type="text" name="country" required> <input type="text" name="city" required></div>');
            });

            $('#dayLengthForm').submit(async function(e) {
                e.preventDefault();
                $('#status').show();
                $('#plotImage').hide();

                const locations = [];
                $('.location').each(function() {
                    locations.push({
                        country: $(this).find('input[name="country"]').val(),
                        city: $(this).find('input[name="city"]').val()
                    });
                });

                try {
                    const response = await fetch('/plot', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ locations, year: $('#year').val() })
                    });

                    if (!response.ok) throw new Error("Check city names and logs.");

                    const blob = await response.blob();
                    $('#plotImage').attr('src', URL.createObjectURL(blob)).show();
                } catch (err) {
                    alert("Error: " + err.message);
                } finally {
                    $('#status').hide();
                }
            });
        });
    </script>
</body>
</html>
